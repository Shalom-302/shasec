# Production compose for Dokploy — pulls the prebuilt image from GHCR (built by
# .github/workflows/build.yml) instead of building locally.
#
# Set the secrets below in the Dokploy "Environment" panel. In prod
# (ENVIRONMENT=prod) the app REFUSES to boot with the dev default secrets, so
# POSTGRES_PASSWORD / TOKEN_SECRET_KEY / OPERA_LOG_ENCRYPT_SECRET_KEY /
# MINIO_SECRET_KEY / DEEPSEEK_API_KEY are mandatory. See DEPLOY.md.
#
# Service names (postgres/redis/minio) are kept underscore-free so the MinIO/S3
# client accepts the host (it rejects names like "monshaapi_minio").

services:
  api:
    image: ghcr.io/shalom-302/shasec:latest
    restart: unless-stopped
    environment:
      # 'prod' by default (docs off, secret guard on). Set ENVIRONMENT=preprod in
      # Dokploy to expose Swagger at /api/v1/docs while keeping the secret guard —
      # works with the currently-deployed image (no rebuild needed).
      - ENVIRONMENT=${ENVIRONMENT:-prod}
      - DB_AUTO_CREATE=false
      # Alternative: keep ENVIRONMENT=prod and set this true (needs the image that
      # carries the FASTAPI_EXPOSE_DOCS flag).
      - FASTAPI_EXPOSE_DOCS=${FASTAPI_EXPOSE_DOCS:-false}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      # Defaults let the stack boot out-of-the-box; they are NOT 'postgres'/'minioadmin'
      # so the prod safety guard still passes. ⚠️ Override these in Dokploy for real prod.
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-shasec_pg_changeme}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE:-monshaapi}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-shasecadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-shasec_minio_changeme}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-monshaapi}
      - MINIO_CLOUD_URL=${MINIO_CLOUD_URL:-http://localhost:9000}
      # ⚠️ MANDATORY for security — set in Dokploy (forgeable JWTs if left empty):
      - TOKEN_SECRET_KEY=${TOKEN_SECRET_KEY}
      - OPERA_LOG_ENCRYPT_SECRET_KEY=${OPERA_LOG_ENCRYPT_SECRET_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      # Durable scans: enqueue to the arq worker. Default OFF so the API always
      # works in-process (scans never hang); set true ONLY once the worker is
      # confirmed running (fresh image that contains arq).
      - SHASEC_USE_ARQ=${SHASEC_USE_ARQ:-false}
      # OWASP ZAP (the `zap` service below); active scan is opt-in (heavy/intrusive).
      - ZAP_ENDPOINT=http://zap:8090
      - ZAP_API_KEY=${ZAP_API_KEY:-shasec-zap}
      - ZAP_ACTIVE_SCAN=${ZAP_ACTIVE_SCAN:-false}
    # Dokploy/Traefik routes the public domain to this container port.
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks: [shasec]

  # arq worker — runs the scan pipeline jobs enqueued by the API (durability:
  # a scan survives an API restart). Same image, different entrypoint.
  worker:
    image: ghcr.io/shalom-302/shasec:latest
    restart: unless-stopped
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-prod}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-shasec_pg_changeme}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE:-monshaapi}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-shasecadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-shasec_minio_changeme}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-monshaapi}
      - MINIO_CLOUD_URL=${MINIO_CLOUD_URL:-http://localhost:9000}
      - TOKEN_SECRET_KEY=${TOKEN_SECRET_KEY}
      - OPERA_LOG_ENCRYPT_SECRET_KEY=${OPERA_LOG_ENCRYPT_SECRET_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - SHASEC_USE_ARQ=true
      - ZAP_ENDPOINT=http://zap:8090
      - ZAP_API_KEY=${ZAP_API_KEY:-shasec-zap}
      - ZAP_ACTIVE_SCAN=${ZAP_ACTIVE_SCAN:-false}
    # Wrapped in sh -c so a missing 'arq' (stale image) only restart-loops this
    # one container instead of failing `docker compose up` for the whole stack.
    entrypoint: ["sh", "-c", "exec arq backend.app.shasec.worker.WorkerSettings"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [shasec]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      # Must match the api's POSTGRES_PASSWORD above (same default / same override).
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-shasec_pg_changeme}
      - POSTGRES_DB=${POSTGRES_DATABASE:-monshaapi}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DATABASE:-monshaapi}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [shasec]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [shasec]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # Must match the api's MINIO_ACCESS_KEY / MINIO_SECRET_KEY (same default / override).
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-shasecadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-shasec_minio_changeme}
    volumes:
      - miniodata:/data
    networks: [shasec]

  # OWASP ZAP daemon — spider + passive scan on every scan; active scan is opt-in
  # (ZAP_ACTIVE_SCAN=true on api/worker). Heavy (~1.5 GB Java): delete this service
  # if your VPS is small — the zap plugin then just skips cleanly (an INFO finding).
  zap:
    image: zaproxy/zap-stable
    restart: unless-stopped
    command: >
      zap.sh -daemon -host 0.0.0.0 -port 8090
      -config api.key=${ZAP_API_KEY:-shasec-zap}
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
    networks: [shasec]

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  shasec:
