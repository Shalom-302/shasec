services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: monshaapi:latest
    container_name: monshaapi_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Point the app at the compose service names (overrides .env localhost)
      - POSTGRES_HOST=monshaapi_postgres
      - REDIS_HOST=monshaapi_redis
      # Use the compose SERVICE name (not the container_name): the MinIO/S3 client
      # validates the host as an RFC hostname and rejects the underscore in
      # "monshaapi_minio". "minio" resolves on the same network and is valid.
      - MINIO_ENDPOINT=minio:9000
      # OWASP ZAP (only reachable when started with `--profile zap`)
      - ZAP_ENDPOINT=http://monshaapi_zap:8090
      - ZAP_API_KEY=${ZAP_API_KEY:-shasec-zap}
      # Durable scans: enqueue to the arq worker (below) instead of in-process.
      - SHASEC_USE_ARQ=true
    # Dev: bind-mount the source so edits hot-reload (uvicorn --reload). The venv
    # lives at /opt/venv (outside /app) so it is not shadowed by this mount.
    volumes:
      - ./backend:/app/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - monshaapi

  # arq worker — runs the scan pipeline jobs enqueued by the API (durability).
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: monshaapi:latest
    container_name: monshaapi_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=monshaapi_postgres
      - REDIS_HOST=monshaapi_redis
      - MINIO_ENDPOINT=minio:9000
      - ZAP_ENDPOINT=http://monshaapi_zap:8090
      - ZAP_API_KEY=${ZAP_API_KEY:-shasec-zap}
      - SHASEC_USE_ARQ=true
    volumes:
      - ./backend:/app/backend
    # Override the API entrypoint: run the arq worker, not uvicorn/migrations.
    entrypoint: ["arq", "backend.app.shasec.worker.WorkerSettings"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - monshaapi

  postgres:
    image: postgres:16-alpine
    container_name: monshaapi_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DATABASE:-monshaapi}
    volumes:
      - monshaapi_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DATABASE:-monshaapi}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - monshaapi

  redis:
    image: redis:7-alpine
    container_name: monshaapi_redis
    restart: unless-stopped
    volumes:
      - monshaapi_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - monshaapi

  # OWASP ZAP daemon — opt-in (heavy Java app). Start with:
  #   docker compose --profile zap up -d zap
  # The shasec `zap` plugin talks to its REST API; when this service is down the
  # plugin skips cleanly.
  zap:
    image: zaproxy/zap-stable
    container_name: monshaapi_zap
    restart: unless-stopped
    profiles: ["zap"]
    command: >
      zap.sh -daemon -host 0.0.0.0 -port 8090
      -config api.key=${ZAP_API_KEY:-shasec-zap}
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
    networks:
      - monshaapi

  minio:
    image: minio/minio:latest
    container_name: monshaapi_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - monshaapi_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - monshaapi

volumes:
  monshaapi_postgres:
  monshaapi_redis:
  monshaapi_minio:

networks:
  monshaapi:
    driver: bridge
